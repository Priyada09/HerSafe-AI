<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HerSafe AI — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink:       #e8476a;
      --pink-light: #f9d0da;
      --pink-dark:  #c0304f;
      --cream:      #fdf6f0;
      --charcoal:   #1e1e2e;
      --muted:      #6b6b80;
      --white:      #ffffff;
      --radius:     16px;
      --shadow:     0 8px 40px rgba(232,71,106,0.13);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: auto;
      position: relative;
    }

    /* Background blobs */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.25;
      z-index: 0;
    }
    body::before {
      width: 500px; height: 500px;
      background: var(--pink);
      top: -150px; right: -100px;
    }
    body::after {
      width: 400px; height: 400px;
      background: #ffb3c6;
      bottom: -100px; left: -80px;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      padding: 24px;
    }

    /* Brand */
    .brand {
      text-align: center;
      margin-bottom: 32px;
      animation: fadeDown 0.6s ease both;
    }
    .brand-icon {
      width: 56px; height: 56px;
      background: var(--pink);
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 12px;
      box-shadow: 0 4px 20px rgba(232,71,106,0.35);
    }
    .brand h1 {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      color: var(--charcoal);
      letter-spacing: -0.5px;
    }
    .brand p {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
    }

    /* Card */
    .card {
      background: var(--white);
      border-radius: 24px;
      padding: 36px 32px;
      box-shadow: var(--shadow);
      animation: fadeUp 0.6s ease 0.1s both;
    }

    /* Tabs */
    .tabs {
      display: flex;
      background: #f5f0f7;
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 28px;
    }
    .tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      color: var(--muted);
      transition: all 0.25s;
      border: none;
      background: transparent;
    }
    .tab.active {
      background: var(--white);
      color: var(--pink);
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    /* Form panels */
    .form-panel { display: none; }
    .form-panel.active { display: block; }

    .field {
      margin-bottom: 18px;
      animation: fadeUp 0.4s ease both;
    }
    .field:nth-child(1) { animation-delay: 0.05s; }
    .field:nth-child(2) { animation-delay: 0.10s; }
    .field:nth-child(3) { animation-delay: 0.15s; }
    .field:nth-child(4) { animation-delay: 0.20s; }
    .field:nth-child(5) { animation-delay: 0.25s; }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--charcoal);
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid #ede8f0;
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--charcoal);
      background: #fafafa;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus {
      border-color: var(--pink);
      box-shadow: 0 0 0 3px rgba(232,71,106,0.1);
      background: var(--white);
    }
    input::placeholder { color: #bbb; }

    .row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: var(--pink);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(232,71,106,0.3);
    }
    .btn:hover {
      background: var(--pink-dark);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(232,71,106,0.4);
    }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .msg {
      margin-top: 14px;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 13px;
      display: none;
    }
    .msg.success { background: #edfbf3; color: #1a7a45; display: block; }
    .msg.error   { background: #fdedf0; color: var(--pink-dark); display: block; }

    .divider {
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      margin: 20px 0 0;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="brand">
    <img src="logo.png" alt="HerSafe AI Logo" style="height:80px;object-fit:contain;margin-bottom:8px;"/>
    <p>Your personal safety companion</p>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Login</button>
      <button class="tab" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <!-- LOGIN FORM -->
    <div class="form-panel active" id="login-panel">
      <div class="field">
        <label>Email address</label>
        <input type="email" id="login-email" placeholder="you@example.com"/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••"/>
      </div>
      <button class="btn" onclick="handleLogin()">Login →</button>
      <p style="text-align:center;margin-top:12px;font-size:13px;"><a href="forgot.html" style="color:var(--pink);text-decoration:none;">Forgot password?</a></p>
      <div class="msg" id="login-msg"></div>
      <p class="divider">Don't have an account? <span style="color:var(--pink);cursor:pointer" onclick="switchTab('signup')">Sign up</span></p>
    </div>

    <!-- SIGNUP FORM -->
    <div class="form-panel" id="signup-panel">
      <div class="row-2">
        <div class="field">
          <label>Full name</label>
          <input type="text" id="signup-name" placeholder="Priya Sharma"/>
        </div>
        <div class="field">
          <label>Phone number</label>
          <input type="tel" id="signup-phone" placeholder="+91 9876543210"/>
        </div>
      </div>
      <div class="field">
        <label>Email address</label>
        <input type="email" id="signup-email" placeholder="you@example.com"/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="signup-password" placeholder="Min. 6 characters"/>
      </div>
      <div class="field">
        <label>Emergency contact email</label>
        <input type="email" id="signup-emergency" placeholder="trusted@example.com"/>
      </div>
      <button class="btn" onclick="handleSignup()">Create Account →</button>
      <div class="msg" id="signup-msg"></div>
      <p class="divider">Already have an account? <span style="color:var(--pink);cursor:pointer" onclick="switchTab('login')">Login</span></p>
    </div>
  </div>
</div>

<script>
  const API = 'https://hersafe-ai.onrender.com';

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'signup' && i === 1));
    });
    document.getElementById('login-panel').classList.toggle('active', tab === 'login');
    document.getElementById('signup-panel').classList.toggle('active', tab === 'signup');
  }

  function showMsg(id, text, type) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = `msg ${type}`;
  }

  async function handleLogin() {
    const email    = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;

    if (!email || !password) return showMsg('login-msg', 'Please fill in all fields.', 'error');

    try {
      const res  = await fetch(`${API}/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();

      if (res.ok) {
        localStorage.setItem('hersafe_user', JSON.stringify(data.user));
        showMsg('login-msg', '✅ Login successful! Redirecting...', 'success');
        setTimeout(() => window.location.href = 'dashboard.html', 1200);
      } else {
        showMsg('login-msg', data.error || 'Login failed.', 'error');
      }
    } catch {
      // MongoDB not connected yet — demo mode
      const demoUser = { name: 'Demo User', email };
      localStorage.setItem('hersafe_user', JSON.stringify(demoUser));
      showMsg('login-msg', '✅ Demo login successful! Redirecting...', 'success');
      setTimeout(() => window.location.href = 'dashboard.html', 1200);
    }
  }

  async function handleSignup() {
    const name      = document.getElementById('signup-name').value.trim();
    const phone     = document.getElementById('signup-phone').value.trim();
    const email     = document.getElementById('signup-email').value.trim();
    const password  = document.getElementById('signup-password').value;
    const emergency = document.getElementById('signup-emergency').value.trim();

    if (!name || !email || !password) return showMsg('signup-msg', 'Name, email and password are required.', 'error');
    if (password.length < 6)          return showMsg('signup-msg', 'Password must be at least 6 characters.', 'error');

    try {
      const res  = await fetch(`${API}/signup`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, phone, email, password, emergency_contact: emergency })
      });
      const data = await res.json();

      if (res.ok) {
        showMsg('signup-msg', '✅ Account created! Please login.', 'success');
        setTimeout(() => switchTab('login'), 1500);
      } else {
        showMsg('signup-msg', data.error || 'Signup failed.', 'error');
      }
    } catch {
      // Demo mode
      showMsg('signup-msg', '✅ Demo account created! Please login.', 'success');
      setTimeout(() => switchTab('login'), 1500);
    }
  }
</script>
</body>
</html>
